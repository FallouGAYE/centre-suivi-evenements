services:
  db:
    image: postgres:17
    container_name: piver_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: piver_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: piver_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/piver_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: piver_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: